name: Metrics
on:
  # Agenda para rodar a cada 24 horas (recomendado para não sobrecarregar o perfil)
  schedule: [{cron: "0 0 * * *"}]
  # Permite rodar manualmente para testar
  workflow_dispatch:
  # Roda sempre que você fizer um push na main
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Seu token do GitHub (o GITHUB_TOKEN padrão já funciona para dados básicos)
          token: ${{ secrets.GITHUB_TOKEN }}

          # Opções de exibição
          user: esmeraldocarneiro
          template: classic
          base: header, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          
          # Plugins para mostrar o que você pediu (Status e Repositórios)
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          
          # Mostra conquistas (opcional, mas fica legal no perfil)
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 10
